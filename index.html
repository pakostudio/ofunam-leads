<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFUNAM · CRM Patrocinadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c14;--bg2:#111220;--bg3:#181929;--bg4:#1e2035;
  --border:#252840;--border2:#2e324a;
  --gold:#c9a84c;--gold-dim:#8a6f2a;--gold-light:#e8d49e;
  --text:#f0eee8;--text-muted:#7d7f9a;--text-dim:#3e4060;
  --blue:#4a7ff5;--blue-bg:#1a2a4e;
  --purple:#9b6dff;--purple-bg:#291a4e;
  --green:#34c98e;--green-bg:#0a3326;
  --red:#f25454;--red-bg:#3a1010;
  --amber:#f5a623;--amber-bg:#3a2a00;
  --sidebar-w:224px;
}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:26px 20px 18px;border-bottom:1px solid var(--border)}
.logo-main{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--gold);letter-spacing:.06em;display:block}
.logo-sub{font-size:.62rem;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;display:block;font-style:italic}
.sidebar-nav{flex:1;padding:14px 0;overflow-y:auto}
.nav-sec-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.16em;color:var(--text-dim);padding:8px 20px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:8px;cursor:pointer;font-size:.83rem;font-weight:400;color:var(--text-muted);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(201,168,76,.13);color:var(--gold-light);font-weight:500}
.nav-icon{width:15px;height:15px;flex-shrink:0;fill:currentColor;opacity:.75}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--bg4);color:var(--text-muted);font-size:.62rem;padding:1px 7px;border-radius:10px;font-weight:600}
.nav-item.active .nav-badge{background:rgba(201,168,76,.2);color:var(--gold)}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.export-btn,.import-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text-muted);font-family:'Figtree',sans-serif;font-size:.75rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.export-btn:hover{border-color:var(--gold-dim);color:var(--gold-light)}
.import-btn:hover{border-color:var(--border2);color:var(--text)}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 26px;gap:14px;flex-shrink:0;background:var(--bg2)}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:8px;font-family:'Figtree',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--gold);color:#140e00}
.btn-primary:hover{background:var(--gold-light)}
.btn-ghost{background:var(--bg4);color:var(--text-muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.content{flex:1;overflow-y:auto;padding:24px 26px}
/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.kpi-label{font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;color:var(--text);line-height:1;margin-bottom:3px}
.kpi-sub{font-size:.7rem;color:var(--text-muted)}
.kpi-card.gold .kpi-value{color:var(--gold)}
.kpi-card.green .kpi-value{color:var(--green)}
.kpi-card.blue .kpi-value{color:var(--blue)}
.kpi-card.purple .kpi-value{color:var(--purple)}
/* ── CARDS / DASH ── */
.dash-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.card-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.11em;color:var(--text-muted);margin-bottom:14px;font-weight:600}
.pipe-bar{margin-bottom:9px}
.pipe-bar-top{display:flex;justify-content:space-between;font-size:.76rem;color:var(--text);margin-bottom:4px}
.pipe-bar-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pipe-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-input,.filter-select{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Figtree',sans-serif;font-size:.8rem;outline:none;transition:border-color .15s}
.search-input{flex:1;min-width:180px}
.search-input:focus,.filter-select:focus{border-color:var(--gold-dim)}
.search-input::placeholder{color:var(--text-dim)}
.filter-select{cursor:pointer;color:var(--text-muted)}
.filter-select option{background:var(--bg3)}
/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{padding:10px 14px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:10px 14px;color:var(--text);vertical-align:middle}
.td-name{font-weight:500;color:var(--text)}
.td-cargo{color:var(--text-muted);font-size:.73rem;margin-top:1px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── BADGES ── */
.etapa-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:600;white-space:nowrap}
.etapa-nuevo{background:var(--bg4);color:var(--text-muted)}
.etapa-contactado{background:var(--blue-bg);color:var(--blue)}
.etapa-reunion{background:var(--purple-bg);color:var(--purple)}
.etapa-propuesta{background:var(--amber-bg);color:var(--amber)}
.etapa-ganado{background:var(--green-bg);color:var(--green)}
.etapa-descartado{background:var(--red-bg);color:var(--red)}
.prio{font-size:.7rem;font-weight:600}
.prio-alta{color:var(--gold)}
.prio-media{color:var(--blue)}
.prio-baja{color:var(--text-muted)}
.fit-tags{display:flex;gap:3px;flex-wrap:wrap}
.fit-tag{padding:2px 6px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;font-size:.62rem;color:var(--text-muted);font-weight:500}
.email-link{color:var(--gold-light);text-decoration:none;font-size:.75rem}
.email-link:hover{text-decoration:underline}
.no-val{color:var(--text-dim);font-size:.72rem;font-style:italic}
.fase-pill{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.fase-1{background:rgba(201,168,76,.14);color:var(--gold)}
.fase-2{background:var(--bg4);color:var(--text-muted)}
/* ── KANBAN ── */
.pipeline-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;min-height:calc(100vh - 130px)}
.k-col{flex-shrink:0;width:230px;display:flex;flex-direction:column}
.k-head{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:8px 8px 0 0;border:1px solid;border-bottom:none}
.k-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.k-title{font-size:.76rem;font-weight:600;flex:1}
.k-count{font-size:.65rem;color:var(--text-muted);background:var(--bg4);padding:1px 6px;border-radius:9px}
.k-body{flex:1;min-height:200px;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 8px 8px;padding:9px;display:flex;flex-direction:column;gap:7px;transition:background .15s,border-color .15s}
.k-body.drag-over{border-color:var(--gold-dim);background:rgba(201,168,76,.05)}
.k-card{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:11px;cursor:grab;transition:transform .12s,box-shadow .12s;user-select:none}
.k-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.35)}
.k-card.dragging{opacity:.3;cursor:grabbing}
.k-card-name{font-size:.79rem;font-weight:500;color:var(--text);margin-bottom:2px}
.k-card-cargo{font-size:.7rem;color:var(--text-muted);margin-bottom:5px;line-height:1.3;max-height:2.6em;overflow:hidden}
.k-card-empresa{font-size:.68rem;color:var(--gold);font-weight:600}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
/* ── EMPRESAS ── */
.empresas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.emp-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s,transform .15s}
.emp-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.emp-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--text);margin-bottom:3px}
.emp-sub{font-size:.72rem;color:var(--text-muted);margin-bottom:10px}
.emp-fits{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:610px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:26px;transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--text);margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.fg input,.fg select,.fg textarea{padding:8px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Figtree',sans-serif;font-size:.82rem;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold-dim)}
.fg textarea{resize:vertical;min-height:72px}
.fg select option{background:var(--bg3)}
.fit-checks{display:flex;gap:10px;flex-wrap:wrap;padding-top:2px}
.fit-check{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.8rem;color:var(--text-muted)}
.fit-check input{accent-color:var(--gold);cursor:pointer}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(242,84,84,.25);padding:7px 14px;border-radius:7px;font-family:'Figtree',sans-serif;font-size:.76rem;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:var(--red-bg)}
/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--green);border-radius:8px;padding:11px 18px;font-size:.82rem;color:var(--text);z-index:2000;transform:translateY(60px);opacity:0;transition:all .25s}
.toast.show{transform:translateY(0);opacity:1}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:.85rem}
/* ── IMPORT PANEL ── */
#import-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;display:none}
#import-panel textarea{width:100%;height:100px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Figtree',monospace;font-size:.75rem;padding:10px;outline:none;resize:vertical;margin:8px 0}
</style>
</head>
<body>

<aside class="sidebar">

      <div class="fg"><label>Prioridad</label>

      </div>
    </div>
  </div>
</div>

   STATE

let leads=[], view="dashboard", editId=null;
let fSearch="", fEtapa="", fEmpresa="", fPrio="", fFase="";
let dragId=null;

const ETAPAS=[
  {k:"nuevo",label:"Nuevo",color:"#6b7280"},
  {k:"contactado",label:"Contactado",color:"#4a7ff5"},
  {k:"reunion",label:"Reunión",color:"#9b6dff"},
  {k:"propuesta",label:"Propuesta",color:"#f5a623"},
  {k:"ganado",label:"Ganado ✓",color:"#34c98e"},
  {k:"descartado",label:"Descartado",color:"#f25454"},
];

/* ═══════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════ */
function load(){
  try{
    const s=localStorage.getItem("ofunam_crm_v2");
    leads=s?JSON.parse(s):SEED.map(x=>({...x}));
  }catch(e){leads=SEED.map(x=>({...x}))}
  save();
}
function save(){
  localStorage.setItem("ofunam_crm_v2",JSON.stringify(leads));
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
const TITLES={dashboard:"Dashboard",prospectos:"Prospectos",pipeline:"Pipeline",empresas:"Empresas"};
function goTo(v){
  view=v;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("nav-"+v)?.classList.add("active");
  document.getElementById("topbar-title").textContent=TITLES[v];
  render();
  updateBadges();
}
function updateBadges(){
  document.getElementById("badge-prospectos").textContent=leads.length;
  document.getElementById("badge-empresas").textContent=[...new Set(leads.map(l=>l.empresa))].length;
}

/* ═══════════════════════════════════════════
   RENDER ROUTER
═══════════════════════════════════════════ */
function render(){
  const c=document.getElementById("content");
  if(view==="dashboard") c.innerHTML=renderDash();
  else if(view==="prospectos") c.innerHTML=renderProspectos();
  else if(view==="pipeline") c.innerHTML=renderPipeline();
  else if(view==="empresas") c.innerHTML=renderEmpresas();
  if(view==="pipeline") setupDrag();
}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
function renderDash(){
  const total=leads.length;
  const conEmail=leads.filter(l=>l.email).length;
  const cdmx=leads.filter(l=>/ciudad de m[eé]xico|cdmx|mexico city/i.test(l.ciudad||"")).length;
  const ganados=leads.filter(l=>l.etapa==="ganado").length;
  const alta=leads.filter(l=>l.prio==="alta").length;

  const piBar=(etapa,color)=>{
    const n=leads.filter(l=>l.etapa===etapa.k).length;
    const pct=total>0?Math.round(n/total*100):0;
    return `<div class="pipe-bar">
      <div class="pipe-bar-top"><span>${etapa.label}</span><span style="color:var(--text-muted)">${n}</span></div>
      <div class="pipe-bar-track"><div class="pipe-bar-fill" style="width:${pct}%;background:${etapa.color}"></div></div>
    </div>`;
  };

  const empMap={};
  leads.forEach(l=>{
    if(!empMap[l.empresa])empMap[l.empresa]={n:0,fase:l.fase,emails:0};
    empMap[l.empresa].n++;
    if(l.email)empMap[l.empresa].emails++;
  });
  const empRows=Object.entries(empMap)
    .sort((a,b)=>(a[1].fase-b[1].fase)||b[1].n-a[1].n)
    .slice(0,10)
    .map(([nom,d])=>`<tr onclick="filterByEmp('${esc(nom)}')">
      <td><span style="font-weight:500">${nom}</span></td>
      <td><span class="fase-pill fase-${d.fase}">F${d.fase}</span></td>
      <td style="color:var(--text-muted)">${d.n}</td>
      <td style="color:${d.emails>0?"var(--green)":"var(--text-dim)"}">${d.emails>0?d.emails+" ✓":"—"}</td>
    </tr>`).join("");

  return `<div class="kpi-grid">
    <div class="kpi-card gold"><div class="kpi-label">Total Leads</div><div class="kpi-value">${total}</div><div class="kpi-sub">${alta} de alta prioridad</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Con Email</div><div class="kpi-value">${conEmail}</div><div class="kpi-sub">${total>0?Math.round(conEmail/total*100):0}% de cobertura</div></div>
    <div class="kpi-card purple"><div class="kpi-label">En CDMX</div><div class="kpi-value">${cdmx}</div><div class="kpi-sub">Target principal</div></div>
    <div class="kpi-card green"><div class="kpi-label">Ganados</div><div class="kpi-value">${ganados}</div><div class="kpi-sub">${leads.filter(l=>l.etapa==="propuesta").length} en propuesta</div></div>
  </div>
  <div class="dash-grid">
    <div class="card"><div class="card-title">Pipeline por etapa</div>${ETAPAS.filter(e=>e.k!=="descartado").map(e=>piBar(e)).join("")}</div>
    <div class="card"><div class="card-title">Empresas objetivo</div><div style="overflow-x:auto"><table>
      <thead><tr><th>Empresa</th><th>Fase</th><th>Leads</th><th>Emails</th></tr></thead>
      <tbody>${empRows}</tbody>
    </table></div></div>
  </div>`;
}
function filterByEmp(emp){fEmpresa=emp;goTo("prospectos")}

/* ═══════════════════════════════════════════
   PROSPECTOS
═══════════════════════════════════════════ */
function renderProspectos(){
  const empOpts=[...new Set(leads.map(l=>l.empresa))].sort()
    .map(e=>`<option value="${e}"${fEmpresa===e?" selected":""}>${e}</option>`).join("");

  let list=leads.filter(l=>{
    const q=fSearch.toLowerCase();
    const ms=!q||[l.nombre,l.cargo,l.empresa,l.email].some(v=>v?.toLowerCase().includes(q));
    const me=!fEtapa||l.etapa===fEtapa;
    const mep=!fEmpresa||l.empresa===fEmpresa;
    const mp=!fPrio||l.prio===fPrio;
    const mf=!fFase||String(l.fase)===fFase;
    return ms&&me&&mep&&mp&&mf;
  });

  const rows=list.length===0?`<tr><td colspan="8" class="empty">Sin resultados. Limpia los filtros.</td></tr>`:
    list.map(l=>`<tr onclick="openModal(${l.id})">
      <td><div class="td-name">${l.nombre}</div><div class="td-cargo">${l.cargo||""}</div></td>
      <td style="color:var(--gold);font-weight:500;font-size:.8rem">${l.empresa}</td>
      <td>${l.email?`<a class="email-link" href="mailto:${l.email}" onclick="event.stopPropagation()">${l.email}</a>`:'<span class="no-val">—</span>'}</td>
      <td>${l.tel?`<span style="font-size:.75rem;color:var(--text-muted)">${l.tel}</span>`:'<span class="no-val">—</span>'}</td>
      <td><span class="etapa-badge etapa-${l.etapa}">${elabel(l.etapa)}</span></td>
      <td><span class="prio prio-${l.prio}">${picon(l.prio)} ${l.prio.charAt(0).toUpperCase()+l.prio.slice(1)}</span></td>
      <td><div class="fit-tags">${(l.fit||[]).map(f=>`<span class="fit-tag">${f}</span>`).join("")}</div></td>
      <td><span class="fase-pill fase-${l.fase}">F${l.fase}</span></td>
    </tr>`).join("");

  return `<div id="import-panel">
    <div class="card-title">Importar CSV (pega filas: nombre,cargo,empresa,email,tel,ciudad)</div>
    <textarea id="csv-text" placeholder="Rosenda Martínez,Dir RSE,GNP Seguros,r@gnp.com,,CDMX"></textarea>
    <button class="btn btn-primary" onclick="doImport()" style="margin-right:8px">Importar</button>
    <button class="btn btn-ghost" onclick="toggleImport()">Cerrar</button>
  </div>
  <div class="filter-bar">
    <input class="search-input" placeholder="Buscar nombre, cargo, empresa, email..." value="${fSearch}" oninput="fSearch=this.value;render()">
    <select class="filter-select" onchange="fEtapa=this.value;render()">
      <option value="">Todas las etapas</option>
      ${ETAPAS.map(e=>`<option value="${e.k}"${fEtapa===e.k?" selected":""}>${e.label}</option>`).join("")}
    </select>
    <select class="filter-select" id="sel-emp" onchange="fEmpresa=this.value;render()">
      <option value="">Todas las empresas</option>${empOpts}
    </select>
    <select class="filter-select" onchange="fPrio=this.value;render()">
      <option value="">Toda prioridad</option>
      <option value="alta"${fPrio==="alta"?" selected":""}>Alta</option>
      <option value="media"${fPrio==="media"?" selected":""}>Media</option>
      <option value="baja"${fPrio==="baja"?" selected":""}>Baja</option>
    </select>
    <select class="filter-select" onchange="fFase=this.value;render()">
      <option value="">Ambas fases</option>
      <option value="1"${fFase==="1"?" selected":""}>Fase 1</option>
      <option value="2"${fFase==="2"?" selected":""}>Fase 2</option>
    </select>
    <button class="btn btn-ghost" onclick="clearF()">Limpiar</button>
  </div>
  <div style="font-size:.72rem;color:var(--text-muted);margin-bottom:12px">${list.length} prospecto${list.length!==1?"s":""}</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Nombre / Cargo</th><th>Empresa</th><th>Email</th><th>Teléfono</th><th>Etapa</th><th>Prioridad</th><th>Fit</th><th>Fase</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function clearF(){fSearch="";fEtapa="";fEmpresa="";fPrio="";fFase="";render()}

/* ═══════════════════════════════════════════
   PIPELINE
═══════════════════════════════════════════ */
function renderPipeline(){
  const cols=ETAPAS.map(e=>{
    const cl=leads.filter(l=>l.etapa===e.k);
    const cards=cl.length===0?`<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:.73rem">Sin leads</div>`:
      cl.map(l=>`<div class="k-card" draggable="true" data-id="${l.id}" onclick="openModal(${l.id})" ondragstart="dStart(event,${l.id})">
        <div class="k-card-name">${l.nombre}</div>
        <div class="k-card-cargo">${l.cargo||""}</div>
        <div class="k-card-empresa">${l.empresa}</div>
        <div class="k-card-foot">
          <span class="prio prio-${l.prio}" style="font-size:.67rem">${picon(l.prio)}</span>
          ${l.email?'<span style="font-size:.65rem;color:var(--green)">✉</span>':''}
          <span class="fase-pill fase-${l.fase}" style="font-size:.58rem">F${l.fase}</span>
        </div>
      </div>`).join("");
    const borderColor=e.color+"40";
    return `<div class="k-col">
      <div class="k-head" style="background:${e.color}16;border-color:${borderColor}">
        <div class="k-dot" style="background:${e.color}"></div>
        <span class="k-title" style="color:${e.color}">${e.label}</span>
        <span class="k-count">${cl.length}</span>
      </div>
      <div class="k-body" data-etapa="${e.k}" ondragover="dOver(event)" ondrop="dDrop(event,'${e.k}')" ondragleave="dLeave(event)">${cards}</div>
    </div>`;
  }).join("");
  return `<div class="pipeline-wrap">${cols}</div>`;
}
function setupDrag(){}
function dStart(e,id){dragId=id;setTimeout(()=>{document.querySelector(`[data-id="${id}"]`)?.classList.add("dragging")},0)}
function dOver(e){e.preventDefault();e.currentTarget.classList.add("drag-over")}
function dLeave(e){e.currentTarget.classList.remove("drag-over")}
function dDrop(e,etapa){
  e.preventDefault();e.currentTarget.classList.remove("drag-over");
  if(dragId===null)return;
  const l=leads.find(x=>x.id===dragId);
  if(l){l.etapa=etapa;save();render();toast(`${l.nombre.split(" ")[0]} → ${elabel(etapa)}`)}
  dragId=null;
}

/* ═══════════════════════════════════════════
   EMPRESAS
═══════════════════════════════════════════ */
function renderEmpresas(){
  const map={};
  leads.forEach(l=>{
    if(!map[l.empresa])map[l.empresa]={list:[],fase:l.fase};
    map[l.empresa].list.push(l);
  });
  const cards=Object.entries(map)
    .sort((a,b)=>a[1].fase-b[1].fase||b[1].list.length-a[1].list.length)
    .map(([nom,d])=>{
      const emails=d.list.filter(l=>l.email).length;
      const altas=d.list.filter(l=>l.prio==="alta").length;
      const fits=[...new Set(d.list.flatMap(l=>l.fit||[]))];
      const etapaStats=ETAPAS.map(e=>{const n=d.list.filter(l=>l.etapa===e.k).length;return n>0?`<span style="font-size:.68rem;color:${e.color}">${n} ${e.label}</span>`:""}).filter(Boolean).join(" · ");
      return `<div class="emp-card" onclick="filterByEmp('${esc(nom)}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div class="emp-name">${nom}</div>
          <span class="fase-pill fase-${d.fase}">Fase ${d.fase}</span>
        </div>
        <div class="emp-sub">${d.list.length} lead${d.list.length!==1?"s":""} · ${emails>0?emails+" email"+(emails!==1?"s":""):"sin emails"} ${altas>0?"· "+altas+" prioridad alta":""}</div>
        <div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px">${etapaStats}</div>
        <div class="emp-fits">${fits.map(f=>`<span class="fit-tag">${f}</span>`).join("")}</div>
      </div>`;
    }).join("");
  return `<div class="empresas-grid">${cards}</div>`;
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal(id){
  editId=id;
  const dl=document.getElementById("dl-empresas");
  dl.innerHTML=[...new Set(leads.map(l=>l.empresa))].sort().map(e=>`<option value="${e}">`).join("");
  const del=document.getElementById("btn-del");
  if(id===null){
    document.getElementById("modal-title").textContent="Nuevo Prospecto";
    ["f-nombre","f-cargo","f-empresa","f-email","f-tel","f-linkedin","f-notas"].forEach(i=>document.getElementById(i).value="");
    document.getElementById("f-ciudad").value="Ciudad de México";
    document.getElementById("f-fase").value="2";
    document.getElementById("f-etapa").value="nuevo";
    document.getElementById("f-prio").value="media";
    document.getElementById("f-fecha").value="";
    ["fc-rse","fc-cultura","fc-genz","fc-marca"].forEach(i=>document.getElementById(i).checked=false);
    del.style.display="none";
  } else {
    const l=leads.find(x=>x.id===id);if(!l)return;
    document.getElementById("modal-title").textContent="Editar Prospecto";
    document.getElementById("f-nombre").value=l.nombre||"";
    document.getElementById("f-cargo").value=l.cargo||"";
    document.getElementById("f-empresa").value=l.empresa||"";
    document.getElementById("f-email").value=l.email||"";
    document.getElementById("f-tel").value=l.tel||"";
    document.getElementById("f-linkedin").value=l.linkedin||"";
    document.getElementById("f-ciudad").value=l.ciudad||"";
    document.getElementById("f-fase").value=String(l.fase||2);
    document.getElementById("f-etapa").value=l.etapa||"nuevo";
    document.getElementById("f-prio").value=l.prio||"media";
    document.getElementById("f-notas").value=l.notas||"";
    document.getElementById("f-fecha").value=l.fecha?l.fecha.split("T")[0]:"";
    document.getElementById("fc-rse").checked=l.fit?.includes("RSE")||false;
    document.getElementById("fc-cultura").checked=l.fit?.includes("Cultura")||false;
    document.getElementById("fc-genz").checked=l.fit?.includes("Gen Z")||false;
    document.getElementById("fc-marca").checked=l.fit?.includes("Marca")||false;
    del.style.display="inline-flex";
  }
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");editId=null}
function handleOverlayClick(e){if(e.target===document.getElementById("modal-overlay"))closeModal()}
function saveLead(){
  const fit=["fc-rse","fc-cultura","fc-genz","fc-marca"]
    .filter(i=>document.getElementById(i).checked)
    .map(i=>document.getElementById(i).value);
  const fv=document.getElementById("f-fecha").value;
  const data={
    nombre:document.getElementById("f-nombre").value.trim()||"Sin nombre",
    cargo:document.getElementById("f-cargo").value.trim(),
    empresa:document.getElementById("f-empresa").value.trim(),
    email:document.getElementById("f-email").value.trim(),
    tel:document.getElementById("f-tel").value.trim(),
    linkedin:document.getElementById("f-linkedin").value.trim(),
    ciudad:document.getElementById("f-ciudad").value.trim(),
    fase:parseInt(document.getElementById("f-fase").value),
    etapa:document.getElementById("f-etapa").value,
    prio:document.getElementById("f-prio").value,
    notas:document.getElementById("f-notas").value.trim(),
    fit,fecha:fv?new Date(fv).toISOString():null,
  };
  if(editId===null){
    const newId=leads.length>0?Math.max(...leads.map(l=>l.id))+1:1;
    leads.push({id:newId,creado:Date.now(),...data});
    toast("Prospecto añadido ✓");
  } else {
    const i=leads.findIndex(l=>l.id===editId);
    if(i!==-1)leads[i]={...leads[i],...data};
    toast("Guardado ✓");
  }
  save();closeModal();render();updateBadges();
}
function deleteLead(){
  if(editId===null||!confirm("¿Eliminar este prospecto?"))return;
  leads=leads.filter(l=>l.id!==editId);
  save();closeModal();render();updateBadges();toast("Eliminado");
}

/* ═══════════════════════════════════════════
   IMPORT / EXPORT
═══════════════════════════════════════════ */
function exportCSV(){
  const H=["ID","Nombre","Cargo","Empresa","Email","Teléfono","LinkedIn","Ciudad","Etapa","Prioridad","Fit","Fase","Notas","Creado","Último contacto"];
  const R=leads.map(l=>[l.id,l.nombre,l.cargo,l.empresa,l.email,l.tel,l.linkedin,l.ciudad,elabel(l.etapa),l.prio,(l.fit||[]).join("|"),l.fase,l.notas,l.creado?new Date(l.creado).toISOString().split("T")[0]:"",l.fecha?l.fecha.split("T")[0]:""].map(v=>`"${String(v||"").replace(/"/g,'""')}"`));
  const csv=[H.map(h=>`"${h}"`).join(","),...R.map(r=>r.join(","))].join("\n");
  dl("\uFEFF"+csv,"OFUNAM_CRM_"+today()+".csv","text/csv");
  toast("CSV exportado ✓");
}
function toggleImport(){
  if(view!=="prospectos"){goTo("prospectos");setTimeout(toggleImport,80);return}
  const p=document.getElementById("import-panel");
  if(p)p.style.display=p.style.display==="none"||!p.style.display?"block":"none";
}
function doImport(){
  const text=document.getElementById("csv-text").value.trim();
  if(!text)return;
  let added=0;
  text.split("\n").forEach(line=>{
    const parts=line.split(",").map(s=>s.trim().replace(/^"|"$/g,""));
    if(parts.length<1||!parts[0])return;
    const newId=leads.length>0?Math.max(...leads.map(l=>l.id))+1:1;
    leads.push({id:newId,nombre:parts[0]||"",cargo:parts[1]||"",empresa:parts[2]||"",email:parts[3]||"",tel:parts[4]||"",ciudad:parts[5]||"",linkedin:"",fase:2,etapa:"nuevo",prio:"media",fit:[],notas:"",creado:Date.now(),fecha:null});
    added++;
  });
  save();render();updateBadges();
  document.getElementById("import-panel").style.display="none";
  toast(`${added} lead${added!==1?"s":""} importado${added!==1?"s":""}`);
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function elabel(e){return{nuevo:"Nuevo",contactado:"Contactado",reunion:"Reunión",propuesta:"Propuesta",ganado:"Ganado",descartado:"Descartado"}[e]||e}
function picon(p){return p==="alta"?"↑↑":p==="media"?"↑":"·"}
function esc(s){return s.replace(/'/g,"\\'")}
function today(){return new Date().toISOString().split("T")[0]}
function dl(content,name,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400)}

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
load();
goTo("dashboard");
</script>
